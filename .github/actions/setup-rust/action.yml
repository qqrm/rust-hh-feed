name: Setup Rust
description: Checkout, setup Rust toolchain, and install tools

inputs:
  toolchain:
    description: Rust toolchain (e.g. stable, nightly)
    required: false
    default: stable

runs:
  using: composite
  steps:
    - name: Setup Rust toolchain
      shell: bash
      run: |
        set -euo pipefail
        rustup toolchain install "${{ inputs.toolchain }}" --profile minimal --no-self-update
        rustup default "${{ inputs.toolchain }}"

    - name: Install Rust tools
      shell: bash
      run: |
        set -euo pipefail
        rustup component add --toolchain "${{ inputs.toolchain }}" clippy rustfmt
        cargo install cargo-machete
