name: HH Query Probe

on:
  push:
    branches:
      - codex/hh-query-probe
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Probe HeadHunter API variants
        shell: bash
        env:
          HH_USER_AGENT: ${{ vars.HH_USER_AGENT }}
        run: |
          set -euo pipefail

          probe() {
            local label="$1"
            local url="$2"
            shift 2

            echo "::group::${label}"
            echo "URL: ${url}"
            local response
            response="$(mktemp)"
            local code
            code="$(
              curl -sS -D - -o "$response" -w '%{http_code}' "$@" "$url"
            )"
            echo "HTTP status: ${code}"
            echo "Body:"
            head -c 1000 "$response"
            echo
            rm -f "$response"
            echo
            echo "::endgroup::"
          }

          default_header=(-H "User-Agent: ${HH_USER_AGENT}" -H "HH-User-Agent: ${HH_USER_AGENT}")

          probe "areas" "https://api.hh.ru/areas" "${default_header[@]}"
          probe "dictionaries" "https://api.hh.ru/dictionaries" "${default_header[@]}"
          probe "vacancies minimal no params" "https://api.hh.ru/vacancies" "${default_header[@]}"
          probe "vacancies text rust" "https://api.hh.ru/vacancies?text=rust" "${default_header[@]}"
          probe "vacancies text rust name-only" "https://api.hh.ru/vacancies?text=rust&search_field=name" "${default_header[@]}"
          probe "vacancies ordered page" "https://api.hh.ru/vacancies?text=rust&per_page=20&page=0&order_by=publication_time" "${default_header[@]}"
          probe "vacancies with date range" "https://api.hh.ru/vacancies?text=rust&per_page=20&page=0&order_by=publication_time&date_from=2026-04-18T00:00:00Z&date_to=2026-04-19T00:00:00Z" "${default_header[@]}"
