name: Release Binary

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-binary-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CARGO_TERM_PROGRESS_WHEN: never

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Cache cargo
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release --quiet

      - name: Publish binary to latest release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if ! gh release view latest >/dev/null 2>&1; then
            gh release create latest --title latest --notes "Automated latest build"
          fi

          gh release upload latest target/release/rust-hh-feed --clobber
