name: Release Binary

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.github/actions/setup-rust/action.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-binary-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CARGO_TERM_PROGRESS_WHEN: never

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Cache cargo
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release --quiet

      - name: Publish binary to latest release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if ! gh release view latest >/dev/null 2>&1; then
            gh release create latest --title latest --notes "Automated latest build"
          fi

          gh release upload latest target/release/rust-hh-feed --clobber
