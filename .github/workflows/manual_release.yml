name: Manual Release

on:
  workflow_dispatch:
    inputs:
      backfill_hours:
        description: 'Optional: widen the fetch window for one-off backfills, typically 72'
        required: false
        type: string

jobs:
  run-bot:
    if: ${{ vars.HH_PIPELINES_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CARGO_TERM_PROGRESS_WHEN: never

    concurrency:
      group: manual-release-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Download release binary
        shell: bash
        env:
          BINARY_NAME: rust-hh-feed
        run: |
          set -euo pipefail
          curl -sSL -o "$BINARY_NAME" \
            "https://github.com/${{ github.repository }}/releases/latest/download/$BINARY_NAME"
          chmod +x "$BINARY_NAME"

      - name: Run bot
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BACKFILL_HOURS: ${{ inputs.backfill_hours }}
          HH_USER_AGENT: ${{ vars.HH_USER_AGENT }}
          HH_PROXY_URLS: ${{ vars.HH_PROXY_URLS }}
          HH_PROXY_SOURCE_URLS: ${{ vars.HH_PROXY_SOURCE_URLS }}
          HH_PROXY_PROBE_TIMEOUT_SECS: ${{ vars.HH_PROXY_PROBE_TIMEOUT_SECS }}
          RUST_LOG: info
          BINARY_NAME: rust-hh-feed
        run: |
          set -euo pipefail
          "./$BINARY_NAME"
