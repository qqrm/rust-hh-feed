name: Auto merge

on:
  workflow_run:
    workflows: ["CI Checks"]
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-merge-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  merge:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Determine PR number
        id: pr
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.workflow_run.pull_requests[0];
            if (!pr) {
              core.setOutput('number', '');
              core.setOutput('author', '');
              core.setOutput('same_repo', 'false');
              core.setOutput('head_ref', '');
              return;
            }

            const { data } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            });
            const sameRepo =
              data.head.repo.full_name === `${context.repo.owner}/${context.repo.repo}`;

            core.setOutput('number', pr.number);
            core.setOutput('author', data.user.login);
            core.setOutput('same_repo', String(sameRepo));
            core.setOutput('head_ref', data.head.ref);

      - name: Merge CI-green Dependabot PR
        if: >
          steps.pr.outputs.number &&
          steps.pr.outputs.author == 'dependabot[bot]' &&
          steps.pr.outputs.same_repo == 'true' &&
          startsWith(steps.pr.outputs.head_ref, 'dependabot/')
        env:
          PR: ${{ steps.pr.outputs.number }}
        shell: bash
        run: |
          set -euo pipefail

          if ! gh pr merge "$PR" --rebase --delete-branch; then
            gh pr merge "$PR" --squash --delete-branch
          fi
