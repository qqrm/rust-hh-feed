name: Post to Telegram

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:
    inputs:
      backfill_hours:
        description: 'Optional: widen the fetch window for one-off backfills, typically 72'
        required: false
        type: string

concurrency:
  group: post-to-telegram-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-bot:
    if: ${{ vars.HH_PIPELINES_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    timeout-minutes: 20
    env:
      CARGO_TERM_PROGRESS_WHEN: never

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download posted jobs state
        uses: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151 # v21
        with:
          workflow: post.yml
          name: posted_jobs
          path: data
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow_conclusion: success
          if_no_artifact_found: fail

      - name: Download release binary
        shell: bash
        env:
          BINARY_NAME: rust-hh-feed
        run: |
          set -euo pipefail
          curl -sSL -o "$BINARY_NAME" \
            "https://github.com/${{ github.repository }}/releases/latest/download/$BINARY_NAME"
          chmod +x "$BINARY_NAME"

      - name: Run bot
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BACKFILL_HOURS: ${{ inputs.backfill_hours }}
          HH_USER_AGENT: ${{ vars.HH_USER_AGENT }}
          HH_PROXY_URLS: ${{ vars.HH_PROXY_URLS }}
          HH_PROXY_SOURCE_URLS: ${{ vars.HH_PROXY_SOURCE_URLS }}
          HH_PROXY_PROBE_TIMEOUT_SECS: ${{ vars.HH_PROXY_PROBE_TIMEOUT_SECS }}
          RUST_LOG: info
          BINARY_NAME: rust-hh-feed
        run: |
          set -euo pipefail
          "./$BINARY_NAME"

      - name: Upload posted jobs state
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: posted_jobs
          path: data/posted_jobs.json

      - name: Notify failure
        if: failure()
        shell: bash
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.DEV_TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d text="❌ Workflow '${{ github.workflow }}' failed. See https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  cleanup-old-runs:
    if: ${{ vars.HH_PIPELINES_ENABLED == 'true' }}
    needs: run-bot
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: write
    steps:
      - name: Delete old workflow runs
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const cutoff = Date.now() - 3 * 24 * 60 * 60 * 1000;
            const {owner, repo} = context.repo;

            const workflows = await github.paginate(
              github.rest.actions.listRepoWorkflows,
              {owner, repo}
            );

            for (const wf of workflows) {
              const runs = await github.paginate(
                github.rest.actions.listWorkflowRuns,
                {
                  owner,
                  repo,
                  workflow_id: wf.id,
                  status: 'completed'
                }
              );

              for (const run of runs) {
                if (Date.parse(run.updated_at) < cutoff) {
                  await github.rest.actions.deleteWorkflowRun({
                    owner,
                    repo,
                    run_id: run.id
                  });
                }
              }
            }
